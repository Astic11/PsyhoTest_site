<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на выгорание</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="mbti.html">MBTI</a>
            <a href="attachment.html">Привязанность</a>
            <a href="temperament.html">Темперамент</a>
            <a href="eq-test.html">EQ</a>
            <a href="burnout-test.html">Выгорание</a>
        </nav>
    </header>
    <main>
        <h1>⚠️ Тест на эмоциональное выгорание</h1>
        <div id="quiz-area"></div>
        <div id="result-area" class="result-area" style="display: none;"></div>
    </main>
    <footer><p>Учебный проект для колледжа © 2026</p></footer>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тёмная тема</button>

    <script>
        // ВОПРОСЫ ТЕСТА
        const questions = [
            "Я чувствую эмоциональное истощение к концу дня.",
            "Мне стало всё равно на то, что раньше вдохновляло.",
            "Я стал более цинично относиться к людям и работе.",
            "Мне трудно собраться с мыслями и сконцентрироваться.",
            "Моё тело часто болит без явной причины (голова, спина).",
            "Я стал меньше радоваться успехам (своим и чужим).",
            "Мне хочется изолироваться от людей.",
            "Моя продуктивность заметно снизилась.",
            "Я чувствую себя обесцененным и ненужным.",
            "Сон не приносит полноценного отдыха."
        ];

        let currentQuestion = 0;
        let userAnswers = [];

        // Функция отображения текущего вопроса
        function showQuestion() {
            if (currentQuestion >= questions.length) {
                calculateResult();
                return;
            }

            const questionText = questions[currentQuestion];
            let html = `
                <div class="question-card">
                    <div class="question-text">
                        <strong>${currentQuestion + 1}. ${questionText}</strong>
                    </div>
                    <div class="options-row">
                        <div class="opt-btn" data-score="1">1 — Никогда</div>
                        <div class="opt-btn" data-score="2">2 — Редко</div>
                        <div class="opt-btn" data-score="3">3 — Иногда</div>
                        <div class="opt-btn" data-score="4">4 — Часто</div>
                        <div class="opt-btn" data-score="5">5 — Постоянно</div>
                    </div>
                </div>
            `;
            document.getElementById("quiz-area").innerHTML = html;

            // Добавляем обработчики на кнопки
            const buttons = document.querySelectorAll(".opt-btn");
            buttons.forEach(btn => {
                btn.addEventListener("click", function() {
                    const score = parseInt(this.getAttribute("data-score"));
                    userAnswers.push(score);
                    currentQuestion++;
                    showQuestion();
                });
            });
        }

        // Подсчёт результатов
        function calculateResult() {
            const total = userAnswers.reduce((sum, val) => sum + val, 0);
            const maxScore = questions.length * 5;
            
            let level = "";
            let recommendation = "";
            
            if (total >= 40) {
                level = "🔴 Высокий уровень выгорания";
                recommendation = "Вам стоит серьёзно обратить внимание на отдых. Возможно, стоит взять паузу и обратиться к психологу. Ваше состояние требует поддержки.";
            } else if (total >= 25) {
                level = "🟡 Средний уровень выгорания (риск)";
                recommendation = "Вы на грани. Попробуйте снизить нагрузку, добавить отдых, хобби и общение. Наблюдайте за своим состоянием.";
            } else {
                level = "🟢 Низкий уровень выгорания";
                recommendation = "У вас всё в порядке! Продолжайте следить за балансом работы и отдыха, чтобы сохранить ресурс.";
            }

            // Сохраняем результат
            localStorage.setItem('lastBurnout', level);
            localStorage.setItem('lastBurnoutDesc', `Балл: ${total} из ${maxScore}. ${recommendation}`);

            // Скрываем вопросы и показываем результат
            document.getElementById("quiz-area").style.display = "none";
            const resultDiv = document.getElementById("result-area");
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `
                <h2>${level}</h2>
                <p>Ваш балл: ${total} из ${maxScore}</p>
                <p>${recommendation}</p>
                <p><small>✅ Результат сохранён. Вы увидите его на странице "Мои результаты".</small></p>
                <button onclick="location.reload()">Пройти заново</button>
            `;
        }

        // Тёмная тема
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = '🌓 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }

        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            const themeBtn = document.querySelector('.theme-toggle');
            if (themeBtn) themeBtn.textContent = '☀️ Светлая тема';
        }

        // ЗАПУСК ТЕСТА
        showQuestion();
    </script>
</body>
</html>
